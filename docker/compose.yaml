name: test-site
services:
  # Сервис сервера
  test-site:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: production
    container_name: test-site
    image: franksergey/test-site
    restart: always

    environment:
      - APP_API_RELOAD=False
      - APP_DB_DATABASE=/data/sqlite.db
      - APP_EXPORTFILE=/data/export.txt
      - APP_API_SITEVERSION=${FEST_SITE_VERSION:-1}

    volumes:
      - sqlite_data:/data/

    env_file:
      - path: .env
        required: false

    networks:
      - server-network

  nginx:
    image: nginx:stable
    container_name: test-site-nginx
    restart: always

    depends_on:
      - test-site

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - ./nginx/test-site.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro

    networks:
      - server-network


networks:
  server-network:
    driver: bridge

volumes:
  sqlite_data:
