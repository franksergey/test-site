name: test-site
services:
  # Сервис сервера
  test-site:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: production
    container_name: test-site
    image: franksergey/test-site
    restart: always

    environment:
      - APP_API_RELOAD=False
      - APP_DB_DATABASE=/data/sqlite.db
      - APP_EXPORTFILE=/data/export.txt
      - APP_API_SITEVERSION=${FEST_SITE_VERSION:-1}

    volumes:
      - sqlite_data:/data/

    env_file:
      - path: .env
        required: false

    ports:
      - ${PORT:-8000}:8000 # FastAPI server port
    networks:
      - bot-network


networks:
  bot-network:
    driver: bridge

volumes:
  sqlite_data:
