<!DOCTYPE html>
<html   lang="ru">
    <head>
        <meta   charset="UTF-8">
        <meta   name="viewport"   content="width=device-width,"   initial-scale="1.0">
        <meta   name="description"  content="This is my first side made on HTML">
        <link   href="style.css" rel="stylesheet" type="text/css" />
        <title>Ритм Ноль</title>
    </head>
    <body>
        <div class="hero">
            <video allowfullscreen="true" muted="muted" autoplay="autoplay" playsinline="playsinline" loop="loop" class="bg-video">
               <source src="media/video-background.mp4" type="video/mp4">
            </video>

            <div class="content">
                <h1>Ритм. Ноль.</h1>
                <p>Море волнуется раз, море волнуется два, море волнуется три — морская фигура замри</p>
   
                <form class="email-form">
                    <label for="input">Мы уведомим о начале мероприятия. Ничего лишнего не пишем</label>
                    <div>
                        <input type="email" placeholder="name@exapmle.ru" required>
                        <button type="submit">Сообщите мне</button>
                    </div>
                    <label class="consent">
                        <input type="checkbox" required>
                        Я согласен на обработку персональных данных
                    </label>
                </form>
            </div>
         </div>
    </body>
</html>
