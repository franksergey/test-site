upstream test_site_backend {
    server test-site:8000;
    keepalive 8;
}

server {
    listen 80;
    server_name xn--h1agcefip8f.xn--p1ai; # Punycode for ритмноль.рф

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name xn--h1agcefip8f.xn--p1ai; # Punycode for ритмноль.рф

    ssl_certificate     /etc/nginx/certs/test-site.crt;
    ssl_certificate_key /etc/nginx/certs/test-site.key;

    # Production-grade TLS settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Small API endpoint: keep uploads tight
    client_max_body_size 4K;

    location / {
        proxy_pass http://test_site_backend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_set_header Connection "";

        proxy_buffering on;
        proxy_request_buffering on;

        proxy_connect_timeout 5s;
        proxy_send_timeout 15s;
        proxy_read_timeout 15s;

        proxy_redirect off;
    }
}